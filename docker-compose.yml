version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: immune_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  immune_api:
    build: .
    container_name: immune_api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_HOST=redis

  simulation_target:
    build: .
    container_name: immune_target
    command: uvicorn simulation.target_env:app --host 0.0.0.0 --port 8001 --reload
    ports:
      - "8001:8001"
    env_file:
      - .env
    volumes:
      - .:/app
      - ./logs:/app/logs

  dashboard:
    build: .
    container_name: immune_dashboard
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      - immune_api
    environment:
      - REDIS_HOST=redis

volumes:
  redis_data:
